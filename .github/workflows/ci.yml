name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose (Production)
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          echo "✓ Production Docker Compose is valid"

      - name: Validate Docker Compose (Local)
        run: |
          docker compose -f docker-compose.local.yml config > /dev/null
          echo "✓ Local Docker Compose is valid"

      - name: Validate Caddyfile (Production)
        run: |
          docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile 2>&1 || true
          echo "✓ Production Caddyfile checked"

      - name: Validate Caddyfile (Local)
        run: |
          docker run --rm -v "$PWD/Caddyfile.local:/etc/caddy/Caddyfile" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile 2>&1 || true
          echo "✓ Local Caddyfile checked"

      - name: Check for secrets in code
        run: |
          if grep -r "password\|secret\|token\|key" --include="*.yml" --include="*.yaml" --include="*.json" . 2>/dev/null | grep -v ".env.example\|README\|node_modules\|.git" | head -5; then
            echo "⚠️  Found potential secrets in code - review needed"
          else
            echo "✓ No obvious secrets found in committed files"
          fi

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start services (Local)
        run: |
          cp .env.example .env
          docker compose -f docker-compose.local.yml up -d
          sleep 10

      - name: Test Caddy health endpoint
        run: |
          curl -sf http://localhost:8080 || (echo "❌ Caddy not responding" && exit 1)
          echo "✓ Caddy is responding"

      - name: Test BackIn15 endpoint
        run: |
          curl -sf http://localhost:5002 || (echo "❌ BackIn15 not responding" && exit 1)
          echo "✓ BackIn15 is responding"

      - name: Test service health
        run: |
          docker compose -f docker-compose.local.yml ps
          docker compose -f docker-compose.local.yml logs --tail=20

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.local.yml down -v

  build-test:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Check sibling repositories exist
        run: |
          if [ -d "../Tempi.app" ]; then
            echo "✓ Tempi.app repository found"
          else
            echo "⚠️  Tempi.app repository not found (expected in production)"
          fi
          
          if [ -d "../backin15" ]; then
            echo "✓ backin15 repository found"
          else
            echo "⚠️  backin15 repository not found (expected in production)"
          fi

      - name: Validate Dockerfile syntax
        run: |
          docker run --rm -v "$PWD/packages/tempi/Dockerfile:/Dockerfile" \
            hadolint/hadolint hadolint /Dockerfile 2>&1 || true
          echo "✓ Dockerfile linting complete"
