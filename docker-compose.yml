services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped

  tempi-app:
    build:
      context: ..
      dockerfile: cyment-infra/packages/tempi/Dockerfile
    networks:
      - web
    restart: unless-stopped



networks:
  web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

