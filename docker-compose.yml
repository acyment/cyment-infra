services:
  caddy:
    image: caddy:2.11
    container_name: caddy
    init: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  tempi-app:
    build:
      context: ..
      dockerfile: cyment-infra/packages/tempi/Dockerfile
    container_name: tempi-app
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backin15-app:
    build:
      context: ../backin15/apps/backin15_web
      dockerfile: Dockerfile
      args:
        - VITE_APTABASE_APP_KEY=${BACKIN15_VITE_APTABASE_APP_KEY:-}
        - VITE_SENTRY_DSN=${BACKIN15_VITE_SENTRY_DSN:-}
        - VITE_APP_VERSION=${BACKIN15_VITE_APP_VERSION:-1.0.0}
        - VITE_APP_IS_RELEASED=${BACKIN15_VITE_APP_IS_RELEASED:-true}
        - VITE_IOS_APP_STORE_URL=${BACKIN15_VITE_IOS_APP_STORE_URL:-}
        - VITE_ANDROID_PLAY_STORE_URL=${BACKIN15_VITE_ANDROID_PLAY_STORE_URL:-}
        - VITE_QR_CODE_URL=${BACKIN15_VITE_QR_CODE_URL:-}
        - VITE_IOS_BUNDLE_ID=${BACKIN15_VITE_IOS_BUNDLE_ID:-com.cyment.backin15}
        - VITE_ANDROID_PACKAGE_NAME=${BACKIN15_VITE_ANDROID_PACKAGE_NAME:-com.cyment.backin15}
        - IOS_TEAM_ID=${BACKIN15_IOS_TEAM_ID:-}
        - IOS_APP_ID=${BACKIN15_IOS_APP_ID:-}
        - ANDROID_APP_ID=${BACKIN15_ANDROID_APP_ID:-}
    container_name: backin15-app
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  fichus-feria:
    build:
      context: ../fichus/backend/feria
      dockerfile: Dockerfile
    container_name: fichus-feria
    environment:
      PORT: 8787
      FERIA_SESSION_TTL_MS: ${FERIA_SESSION_TTL_MS:-90000}
      FERIA_INVITE_TTL_MS: ${FERIA_INVITE_TTL_MS:-120000}
      FERIA_COORDINATION_TTL_MS: ${FERIA_COORDINATION_TTL_MS:-900000}
      FERIA_K_ANON_MIN: ${FERIA_K_ANON_MIN:-5}
      FERIA_MATCH_THRESHOLD: ${FERIA_MATCH_THRESHOLD:-5}
      FERIA_SYNC_RATE_MS: ${FERIA_SYNC_RATE_MS:-3000}
      FERIA_GEOHASH_PRECISION: ${FERIA_GEOHASH_PRECISION:-7}
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://127.0.0.1:8787/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  botini-db:
    image: postgres:18-alpine
    container_name: botini-db
    environment:
      POSTGRES_USER: botini
      POSTGRES_PASSWORD: ${BOTINI_DB_PASSWORD}
      POSTGRES_DB: botini
    volumes:
      - botini_pgdata:/var/lib/postgresql/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botini -d botini"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  botini-redis:
    image: redis:8-alpine
    container_name: botini-redis
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  botini-api:
    build:
      context: ../botini.club
      dockerfile: Dockerfile
    container_name: botini-api
    environment:
      DATABASE_URL: postgresql://botini:${BOTINI_DB_PASSWORD}@botini-db:5432/botini
      REDIS_URL: redis://botini-redis:6379
      CORS_ORIGINS: https://botini.club,https://www.botini.club
      JWT_SECRET: ${BOTINI_JWT_SECRET}
      GOOGLE_DRIVE_API_KEY: ${BOTINI_GOOGLE_DRIVE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${BOTINI_GOOGLE_CLIENT_ID:-}
      ENV: production
    depends_on:
      botini-db:
        condition: service_healthy
      botini-redis:
        condition: service_healthy
    volumes:
      - botini_media:/tmp/botini
    networks:
      - web
    restart: unless-stopped

  botini-worker:
    build:
      context: ../botini.club
      dockerfile: Dockerfile
    container_name: botini-worker
    command: ["uv", "run", "arq", "backend.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql://botini:${BOTINI_DB_PASSWORD}@botini-db:5432/botini
      REDIS_URL: redis://botini-redis:6379
      GOOGLE_DRIVE_API_KEY: ${BOTINI_GOOGLE_DRIVE_API_KEY:-}
    depends_on:
      botini-db:
        condition: service_healthy
      botini-redis:
        condition: service_healthy
    volumes:
      - botini_media:/tmp/botini
    networks:
      - web
    restart: unless-stopped

  botini-frontend:
    build:
      context: ../botini.club/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_GOOGLE_CLIENT_ID: ${BOTINI_GOOGLE_CLIENT_ID:-}
    container_name: botini-frontend
    environment:
      ORIGIN: https://botini.club
    depends_on:
      botini-api:
        condition: service_started
    networks:
      - web
    restart: unless-stopped

  xcsteward-app:
    build:
      context: ../XCSteward-website
      dockerfile: Dockerfile
      args:
        - SITE_URL=${XCSTEWARD_SITE_URL:-https://xcsteward.com}
        - PUBLIC_ANALYTICS_PROVIDER=${XCSTEWARD_ANALYTICS_PROVIDER:-}
        - PUBLIC_PLAUSIBLE_DOMAIN=${XCSTEWARD_PLAUSIBLE_DOMAIN:-}
        - PUBLIC_UMAMI_WEBSITE_ID=${XCSTEWARD_UMAMI_WEBSITE_ID:-}
        - PUBLIC_UMAMI_SRC=${XCSTEWARD_UMAMI_SRC:-}
        - PUBLIC_CLOUDFLARE_ANALYTICS_TOKEN=${XCSTEWARD_CLOUDFLARE_ANALYTICS_TOKEN:-}
        - PUBLIC_GOOGLE_SITE_VERIFICATION=${XCSTEWARD_GOOGLE_SITE_VERIFICATION:-}
    container_name: xcsteward-app
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Self-hosted, cookieless analytics (serves all cyment sites). One instance;
  # create a "website" per property in the Umami UI to get each website-id.
  umami-db:
    image: postgres:18-alpine
    container_name: umami-db
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    networks:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  botini_pgdata:
  botini_media:
  umami_pgdata:
