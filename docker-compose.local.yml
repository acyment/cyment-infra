version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"  # Landing page

    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
