---
- name: Configure Cyment Infrastructure VPS
  hosts: cyment_infra
  become: yes
  vars:
    # User configuration
    deploy_user: "acyment"
    deploy_user_groups:
      - docker
      - sudo
    
    # SSH configuration
    ssh_port: 22
    ssh_permit_root_login: "no"
    ssh_password_authentication: "no"
    ssh_pub_key_authentication: "yes"
    
    # Security
    ufw_enabled: true
    ufw_default_incoming: "deny"
    ufw_default_outgoing: "allow"
    ufw_rules:
      - { port: 22, proto: tcp, rule: allow, comment: "SSH" }
      - { port: 80, proto: tcp, rule: allow, comment: "HTTP" }
      - { port: 443, proto: tcp, rule: allow, comment: "HTTPS" }
    
    # Docker configuration
    docker_users:
      - "{{ deploy_user }}"
    
    # Services to monitor
    services:
      - docker
      - ssh

  tasks:
    # ============================================
    # SYSTEM UPDATES
    # ============================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install essential packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - vim
          - htop
          - ufw
          - fail2ban
          - logrotate
          - unattended-upgrades
          - python3-pip
          - git
          - wget
          - jq
        state: present

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    # ============================================
    # USER CONFIGURATION
    # ============================================
    - name: Ensure deploy user exists
      user:
        name: "{{ deploy_user }}"
        shell: /bin/bash
        groups: "{{ deploy_user_groups | join(',') }}"
        append: yes
        state: present

    - name: Ensure .ssh directory exists for deploy user
      file:
        path: "/home/{{ deploy_user }}/.ssh"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0700'

    # ============================================
    # SSH KEY MANAGEMENT
    # ============================================
    - name: Copy authorized_keys from controller
      copy:
        src: "{{ playbook_dir }}/files/authorized_keys"
        dest: "/home/{{ deploy_user }}/.ssh/authorized_keys"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'
      notify: reload ssh

    - name: Copy GitHub deploy key (private)
      copy:
        src: "{{ playbook_dir }}/files/github_deploy_key"
        dest: "/home/{{ deploy_user }}/.ssh/github_deploy_key"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'
      no_log: true
      when: copy_github_key | default(false) | bool

    - name: Copy GitHub deploy key (public)
      copy:
        src: "{{ playbook_dir }}/files/github_deploy_key.pub"
        dest: "/home/{{ deploy_user }}/.ssh/github_deploy_key.pub"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0644'
      when: copy_github_key | default(false) | bool

    - name: Configure SSH client for GitHub
      copy:
        content: |
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/github_deploy_key
            IdentitiesOnly yes
        dest: "/home/{{ deploy_user }}/.ssh/config"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0600'
      when: copy_github_key | default(false) | bool

    - name: Add GitHub to known_hosts
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t rsa github.com 2>/dev/null') }}"
        path: "/home/{{ deploy_user }}/.ssh/known_hosts"
        state: present
      become_user: "{{ deploy_user }}"

    # ============================================
    # SSH HARDENING
    # ============================================
    - name: Configure SSH daemon
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^{{ item.key }}"
        line: "{{ item.key }} {{ item.value }}"
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      loop:
        - { key: "Port", value: "{{ ssh_port }}" }
        - { key: "PermitRootLogin", value: "{{ ssh_permit_root_login }}" }
        - { key: "PasswordAuthentication", value: "{{ ssh_password_authentication }}" }
        - { key: "PubkeyAuthentication", value: "{{ ssh_pub_key_authentication }}" }
        - { key: "X11Forwarding", value: "no" }
        - { key: "MaxAuthTries", value: "3" }
        - { key: "ClientAliveInterval", value: "300" }
        - { key: "ClientAliveCountMax", value: "2" }
        - { key: "LoginGraceTime", value: "60" }
        - { key: "AllowUsers", value: "{{ deploy_user }}" }
      notify: reload ssh

    - name: Ensure SSH service is running
      service:
        name: ssh
        state: started
        enabled: yes

    # ============================================
    # FAIL2BAN CONFIGURATION
    # ============================================
    - name: Configure fail2ban
      copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 3
          backend = systemd

          [sshd]
          enabled = true
          port = {{ ssh_port }}
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
        dest: /etc/fail2ban/jail.local
      notify: restart fail2ban

    - name: Ensure fail2ban is running
      service:
        name: fail2ban
        state: started
        enabled: yes
      ignore_errors: yes
      register: fail2ban_service

    - name: Debug fail2ban service status
      debug:
        msg: "Fail2ban service status: {{ fail2ban_service | default('Not registered') }}"
      when: fail2ban_service is defined

    # ============================================
    # FIREWALL (UFW)
    # ============================================
    - name: Reset UFW
      ufw:
        state: reset
      when: ufw_enabled | bool

    - name: Set UFW default policies
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: "{{ ufw_default_incoming }}" }
        - { direction: outgoing, policy: "{{ ufw_default_outgoing }}" }
      when: ufw_enabled | bool

    - name: Configure UFW rules
      ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop: "{{ ufw_rules }}"
      when: ufw_enabled | bool

    - name: Enable UFW
      ufw:
        state: enabled
      when: ufw_enabled | bool

    # ============================================
    # DOCKER INSTALLATION & CONFIGURATION
    # ============================================
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Add deploy user to docker group
      user:
        name: "{{ deploy_user }}"
        groups: docker
        append: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    # ============================================
    # AUTO-UPDATES (SECURITY PATCHES)
    # ============================================
    - name: Configure unattended-upgrades
      copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
          APT::Periodic::Unattended-Upgrade "1";
        dest: /etc/apt/apt.conf.d/20auto-upgrades

    - name: Enable security updates only
      lineinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - regexp: "^//Unattended-Upgrade::Allowed-Origins"
          line: "Unattended-Upgrade::Allowed-Origins {"
        - regexp: "^//\\s+\\${distro_id}:\\${distro_codename}-security"
          line: "        \"${distro_id}:${distro_codename}-security\";"

    # ============================================
    # LOGROTATE CONFIGURATION
    # ============================================
    - name: Configure logrotate for Docker
      copy:
        content: |
          /var/lib/docker/containers/*/*.log {
            rotate 7
            daily
            compress
            size=10M
            missingok
            delaycompress
            copytruncate
          }
        dest: /etc/logrotate.d/docker-container

    # ============================================
    # AUDITING & MONITORING
    # ============================================
    - name: Install auditd for system auditing
      apt:
        name: auditd
        state: present

    - name: Configure audit rules for SSH
      copy:
        content: |
          -w /etc/ssh/sshd_config -p wa -k ssh_config_changes
          -w /etc/passwd -p wa -k identity_changes
          -w /etc/group -p wa -k identity_changes
        dest: /etc/audit/rules.d/cyment-infra.rules
      notify: restart auditd

    - name: Ensure auditd is running
      service:
        name: auditd
        state: started
        enabled: yes

    # ============================================
    # SECURE FILE PERMISSIONS
    # ============================================
    - name: Set secure permissions on critical files
      file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/etc/ssh/sshd_config", mode: "0600" }
        - { path: "/etc/shadow", mode: "0640" }
        - { path: "/etc/passwd", mode: "0644" }

    # ============================================
    # DISABLE UNUSED SERVICES
    # ============================================
    - name: Disable unnecessary services
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - telnet
        - ftp
      ignore_errors: yes

  handlers:
    - name: reload ssh
      service:
        name: ssh
        state: reloaded

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted

    - name: restart auditd
      service:
        name: auditd
        state: restarted
