<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feliche Support</title>
    <style>
      :root {
        --bg: #fff8ef;
        --panel: #ffffff;
        --ink: #18212f;
        --muted: #5d6679;
        --line: #d8deea;
        --accent: #eb5e28;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(235, 94, 40, 0.14), transparent 25rem),
          var(--bg);
        color: var(--ink);
      }
      main { max-width: 760px; margin: 0 auto; padding: 48px 20px 72px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 18px 60px rgba(24, 33, 47, 0.08);
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 3rem); }
      .muted { color: var(--muted); }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="muted"><a href="/">Feliche</a> / Support</p>
        <h1>Feliche Support</h1>
        <p>If you need help with Feliche or have privacy-related questions, contact <a href="mailto:privacy@auguri.app">privacy@auguri.app</a>.</p>
      </section>
    </main>
  </body>
</html>
